name: Final Automation Test --> API & Web UI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write   # Moved to global level

env:
  JAVA_VERSION: 21
  REPORT_DIR: public

jobs:
  # =========================================
  # API & WEB AUTOMATION
  # =========================================
  test:
    name: Run ${{ matrix.test-type }} Test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        test-type: [api, web]

    steps:
      # download repository
      - uses: actions/checkout@v4

      # setup java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{env.JAVA_VERSION}}
          distribution: 'temurin'
          cache: gradle     # Cache gradle for speed

      # install browser
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2.1.0

      # setup gradlew
      - name: Setup gradlew
        run: chmod +x gradlew

      # Execute the Gradle command for running tests
      - name: Execute Test Suite
        run: |
          if [ "${{ matrix.test-type }}" = "api" ]; then
            ./gradlew clean runApiTest --info --stacktrace
          else
            ./gradlew clean runWebTest --info --stacktrace
          fi

      - name: Generate Allure Report
        if: always()
        run: ./gradlew allureReport

      # Upload API & Web Report
      - name: Upload Cucumber Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-${{ matrix.test-type }}
          path: build/reports/cucumber

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-${{ matrix.test-type }}
          path: build/reports/allure-report

  # =========================================
  # DEPLOY TO GITHUB PAGES
  # =========================================
  deploy-report:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
     # Download artifacts
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts   # all artifacts go into this folder

     # Folder structure
      - name: Prepare Folder Structure
        run: |
          mkdir -p $REPORT_DIR/api
          mkdir -p $REPORT_DIR/web
          mkdir -p $REPORT_DIR/allure-api
          mkdir -p $REPORT_DIR/allure-web
          
          # copy cucumber report
          cp -r artifacts/cucumber-api/* $REPORT_DIR/api/ || true
          cp -r artifacts/cucumber-web/* $REPORT_DIR/web/ || true
          
          # copy allure report
          cp -r artifacts/allure-api/* $REPORT_DIR/allure-api/ || true
          cp -r artifacts/allure-web/* $REPORT_DIR/allure-web/ || true

     # Deploy to GitHub Pages
      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN}}
          publish_dir: ${{ env.REPORT_DIR }}