name: Final Automation Test --> API & Web UI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write   # Moved to global level

jobs:
  # =========================================
  # API & WEB AUTOMATION
  # =========================================
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        test-type: [api, web]

    steps:
      # download repository
      - uses: actions/checkout@v4

      # setup java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle     # Cache gradle for speed

      # install browser
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2.1.0

      # setup gradlew
      - name: Setup gradlew
        run: chmod +x gradlew

      # Execute the Gradle command for running tests
      - name: Run API Test
        if: matrix.test-type == 'api'
        run: ./gradlew clean runApiTest --info --stacktrace

      - name: Run Web Test
        if: matrix.test-type == 'web'
        run: ./gradlew clean runWebTest --info --stacktrace

      - name: Generate Allure Report
        if: always()
        run: ./gradlew allureReport

      # Archive API & Web Test Result
      - name: Upload Cucumber Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-${{ matrix.test-type }}
          path: build/reports/cucumber

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-${{ matrix.test-type }}
          path: build/reports/allure-report

  # =========================================
  # DEPLOY TO GITHUB PAGES
  # =========================================
  deploy-report:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

     # Folder structure
      - name: Prepare Folder Structure
        run: |
          mkdir -p public/api
          mkdir -p public/web
          cp -r cucumber-api/* public/api/ || true
          cp -r cucumber-web/* public/web/ || true

     # Deploy to GitHub Pages
      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN}}
          publish_dir: public